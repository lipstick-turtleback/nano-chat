<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="sparkle" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#e0e7ff" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect x="2" y="2" width="60" height="60" rx="16" ry="16" fill="url(#bg)"/>

  <!-- Chat bubble outline -->
  <path d="M14 22 C14 18 17 15 21 15 L43 15 C47 15 50 18 50 22 L50 38 C50 42 47 45 43 45 L30 45 L20 52 L20 45 L21 45 C17 45 14 42 14 38 Z" fill="white" fill-opacity="0.95"/>

  <!-- Sparkle stars inside bubble -->
  <path d="M24 24 L25.5 28 L29.5 28 L26.5 30.5 L27.5 34.5 L24 32 L20.5 34.5 L21.5 30.5 L18.5 28 L22.5 28 Z" fill="url(#sparkle)" transform="translate(4, -2) scale(0.7)"/>
  <circle cx="38" cy="24" r="2.5" fill="#6366f1" opacity="0.7"/>
  <circle cx="44" cy="30" r="1.8" fill="#818cf8" opacity="0.5"/>

  <!-- Letter L monogram -->
  <text x="28" y="36" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#6366f1" text-anchor="middle">L</text>

  <!-- Subtle bottom-right dots -->
  <circle cx="40" cy="38" r="1" fill="#a5b4fc" opacity="0.4"/>
  <circle cx="44" cy="36" r="1" fill="#a5b4fc" opacity="0.3"/>
  <circle cx="42" cy="41" r="0.8" fill="#a5b4fc" opacity="0.3"/>
</svg>
